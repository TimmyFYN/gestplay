version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gestplay-db
    environment:
      POSTGRES_USER: gestplay_user
      POSTGRES_PASSWORD: gestplay_password
      POSTGRES_DB: gestplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Optional Adminer for DB management
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  postgres_data:
